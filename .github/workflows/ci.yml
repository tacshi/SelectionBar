name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # macos-26 (Xcode 26.x) is required, not just preferred: PermissionFlow
    # declares swift-tools-version 6.2, which older toolchains cannot even parse
    # — dependency resolution fails outright on the macos-15 image's Xcode 16.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Print the toolchain rather than pinning an Xcode path: the runner images
      # use versioned bundle names (Xcode_26.5.app) that change without notice,
      # so hardcoding one breaks whenever the image is updated. The image
      # default is what this asserts is new enough to build.
      - name: Show toolchain
        run: |
          swift --version
          xcrun --find swift-format

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      # `swift-format` is not on PATH on the runners, but the Swift toolchain
      # ships it — so this always matches the compiler being used to build.
      - name: Check formatting
        run: xcrun swift-format lint --recursive --strict Sources Tests Package.swift

      - name: Build
        run: swift build

      - name: Test
        run: swift test
