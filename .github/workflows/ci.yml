name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Print the toolchain rather than pinning an Xcode path: the runner images
      # use versioned bundle names (Xcode_16.4.app), so hardcoding one breaks
      # whenever the image is updated. The macos-15 default is Swift 6.
      - name: Show toolchain
        run: |
          swift --version
          xcrun --find swift-format

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      # `swift-format` is not on PATH on the runners, but the Swift toolchain
      # ships it — so this always matches the compiler being used to build.
      - name: Check formatting
        run: xcrun swift-format lint --recursive --strict Sources Tests Package.swift

      - name: Build
        run: swift build

      - name: Test
        run: swift test
